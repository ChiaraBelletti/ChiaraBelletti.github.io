<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Chiara Belletti</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="styles.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }
        .w3-bar {
            width: 100%;
        }
        .w3-bar-item {
            padding: 8px 16px;
        }
        /* Only show menu icon on small screens */
        .menu-icon {
            display: none;
        }
        @media screen and (max-width: 600px) {
            .w3-bar-item:not(:first-child) {
                display: none;
            }
            .w3-dropdown-content {
                position: static;
                display: none;
                background-color: inherit;
                min-width: 160px;
                box-shadow: none;
                z-index: 1;
            }
            .w3-dropdown-content a {
                float: none;
                color: #000;
                padding: 12px 16px;
                text-decoration: none;
                display: block;
                text-align: left;
            }
            .w3-dropdown-hover:hover .w3-dropdown-content {
                display: block;
            }
            .navbar {
                height: 60px;
            }
            .navbar .w3-bar-item:first-child {
                float: left;
                width: auto;
            }
            .navbar .menu-icon {
                display: block;
                float: right;
                padding: 20px;
            }
            .navbar .menu-dropdown {
                display: none;
                position: fixed;
                top: 60px;
                left: 0;
                width: 100%;
                background-color: #fff;
                z-index: 999;
            }
            .navbar .menu-dropdown a {
                display: block;
                padding: 10px 16px;
                color: #000;
                text-decoration: none;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="#" class="w3-bar-item w3-button w3-white">CHIARA BELLETTI</a>
    <!-- Menu icon for mobile -->
    <a href="javascript:void(0);" class="w3-bar-item w3-button w3-right w3-hide-large menu-icon" onclick="toggleMenu()">
        <i class="fa fa-bars"></i>
    </a>
    <!-- Dropdown menu for mobile -->
    <div class="w3-dropdown-hover w3-mobile w3-hide-large menu-dropdown" id="mobileMenu">
        <button class="w3-button">Menu <i class="fa fa-caret-down"></i></button>
        <div class="w3-dropdown-content w3-bar-block w3-dark-grey">
            <a href="#research" class="w3-bar-item w3-button w3-mobile">Research</a>
            <a href="#cv" class="w3-bar-item w3-button w3-mobile">CV</a>
            <a href="#teaching" class="w3-bar-item w3-button w3-mobile">Teaching</a>
        </div>
    </div>
    <!-- Original navigation for larger screens -->
    <div class="w3-dropdown-hover w3-mobile w3-right w3-hide-small w3-hide-medium">
        <button class="w3-button">Research <i class="fa fa-caret-down"></i></button>
        <div class="w3-dropdown-content w3-bar-block w3-dark-grey">
            <a href="#research" class="w3-bar-item w3-button w3-mobile">Work in Progress</a>
            <a href="#research1" class="w3-bar-item w3-button w3-mobile">Other Research</a>
        </div>
    </div>
    <a href="#cv" class="w3-bar-item w3-button w3-right w3-hide-small w3-hide-medium">CV</a>
    <a href="#teaching" class="w3-bar-item w3-button w3-right w3-hide-small w3-hide-medium">Teaching</a>
</nav>

<script>
    function toggleMenu() {
        var x = document.getElementById("mobileMenu");
        if (x.style.display === "block") {
            x.style.display = "none";
        } else {
            x.style.display = "block";
        }
    }
</script>

</body>
</html>
